name: Quality Gates

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Typecheck
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Cross-browser smoke tests
        run: npm run test:e2e -- --grep "core routes|mobile navigation|contact topic"

      - name: Accessibility browser tests
        run: npm run test:a11y

      - name: Lighthouse CI (mobile + desktop)
        run: npm run lighthouse:ci

      - name: Dependency audit (high+)
        run: npm run audit:deps
